services:
  - type: web
    name: demoboosterz-screenshot-server
    runtime: node
    buildCommand: apt-get update && apt-get install -y google-chrome-stable fonts-ipafont-gothic fonts-wqy-zenhei fonts-thai-tlwg fonts-kacst fonts-freefont-ttf libxss1 --no-install-recommends && npm install
    startCommand: node server.js
    envVars:
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: true
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/google-chrome-stable
      - key: AUTH_TOKEN
        value: demoboosterz-screenshots-2024
      - key: NODE_ENV
        value: production
